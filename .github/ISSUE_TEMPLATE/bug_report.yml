name: Bug report
description: Report a problem in False Success Lab
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the broken behavior and what you expected.
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or command
      placeholder: "http://127.0.0.1:8000 or make test"
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, screenshots, or report-card output.
