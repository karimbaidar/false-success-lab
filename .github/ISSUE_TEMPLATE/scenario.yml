name: Scenario contribution
description: Propose a new false-success scenario
title: "[Scenario]: "
labels: ["scenario"]
body:
  - type: input
    id: name
    attributes:
      label: Scenario name
      placeholder: "Approve invoice"
    validations:
      required: true
  - type: textarea
    id: naive
    attributes:
      label: Naive behavior
      description: What does the agent claim or do too early?
    validations:
      required: true
  - type: textarea
    id: protected
    attributes:
      label: Protected behavior
      description: What evidence should block or review continuation?
    validations:
      required: true
  - type: textarea
    id: missing
    attributes:
      label: Missing evidence
      description: List the exact missing facts, outcome checks, or handoff facts.
    validations:
      required: true
