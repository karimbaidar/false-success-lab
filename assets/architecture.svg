<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent consistency refund architecture</title>
  <desc id="desc">Browser, FastAPI, five agents, agent-consistency gates, and run artifacts.</desc>
  <rect width="1280" height="720" fill="#f4f7f8"/>
  <text x="64" y="70" fill="#17202e" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">RefundOps Reliability Architecture</text>
  <text x="64" y="104" fill="#647084" font-family="Inter, Arial, sans-serif" font-size="18">Sequential receipt-gated handoff with outcome verification before customer messaging.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="64" y="158" width="190" height="92" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <text x="92" y="197" fill="#126b68" font-size="14" font-weight="800">BROWSER UI</text>
    <text x="92" y="225" fill="#17202e" font-size="18" font-weight="800">Control Center</text>
    <rect x="314" y="158" width="190" height="92" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <text x="342" y="197" fill="#126b68" font-size="14" font-weight="800">FASTAPI</text>
    <text x="342" y="225" fill="#17202e" font-size="18" font-weight="800">/api/runs</text>
    <path d="M254 204 H314" stroke="#295da8" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="64" y="330" width="180" height="86" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <rect x="274" y="330" width="180" height="86" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <rect x="484" y="330" width="180" height="86" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <rect x="694" y="330" width="180" height="86" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <rect x="904" y="330" width="180" height="86" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <text x="98" y="366" fill="#17202e" font-size="17" font-weight="800">Intake</text>
    <text x="82" y="394" fill="#647084" font-size="14">ticket + order</text>
    <text x="306" y="366" fill="#17202e" font-size="17" font-weight="800">Policy</text>
    <text x="292" y="394" fill="#647084" font-size="14">fresh snapshot</text>
    <text x="522" y="366" fill="#17202e" font-size="17" font-weight="800">Risk</text>
    <text x="508" y="394" fill="#647084" font-size="14">abuse checks</text>
    <text x="718" y="366" fill="#17202e" font-size="17" font-weight="800">Refund</text>
    <text x="714" y="394" fill="#647084" font-size="14">provider status</text>
    <text x="934" y="366" fill="#17202e" font-size="17" font-weight="800">Comms</text>
    <text x="924" y="394" fill="#647084" font-size="14">customer reply</text>
    <path d="M244 373 H274 M454 373 H484 M664 373 H694 M874 373 H904" stroke="#295da8" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="190" y="470" width="748" height="98" rx="14" fill="#152235"/>
    <text x="232" y="512" fill="#ffffff" font-size="22" font-weight="800">agent-consistency reliability layer</text>
    <text x="232" y="544" fill="#a9c5c2" font-size="16">State snapshots | handoff contracts | proof artifacts | outcome verification | causal links</text>
    <path d="M154 416 C154 456 242 456 242 470" stroke="#126b68" stroke-width="3" fill="none"/>
    <path d="M364 416 C364 456 386 456 386 470" stroke="#126b68" stroke-width="3" fill="none"/>
    <path d="M574 416 C574 456 554 456 554 470" stroke="#126b68" stroke-width="3" fill="none"/>
    <path d="M784 416 C784 456 724 456 724 470" stroke="#126b68" stroke-width="3" fill="none"/>
    <path d="M994 416 C994 456 900 456 900 470" stroke="#126b68" stroke-width="3" fill="none"/>
    <rect x="1000" y="500" width="210" height="86" rx="12" fill="#ffffff" stroke="#d7dee9"/>
    <text x="1030" y="536" fill="#126b68" font-size="14" font-weight="800">RUN ARTIFACTS</text>
    <text x="1030" y="564" fill="#17202e" font-size="17" font-weight="800">summary, report, receipts</text>
    <path d="M938 536 H1000" stroke="#295da8" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#295da8"/>
    </marker>
  </defs>
