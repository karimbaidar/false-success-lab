services:
  - type: web
    name: false-success-lab-api
    runtime: python
    plan: free
    buildCommand: python -m pip install -U pip && python -m pip install -r requirements.txt
    startCommand: MODEL_PROVIDER=heuristic OUTPUT_DIR=/tmp/false-success-lab-runs python -m uvicorn refund_demo.web:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MODEL_PROVIDER
        value: heuristic
      - key: OUTPUT_DIR
        value: /tmp/false-success-lab-runs
      - key: FALSE_SUCCESS_ALLOWED_ORIGINS
        value: https://karimbaidar.github.io,http://127.0.0.1:8000,http://localhost:8000
